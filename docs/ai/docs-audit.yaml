# Docs audit policy (RFC-0002 D4). Committed, project-owned.
# Docs first committed before legacy_until_date soft-warn; newer docs and
# untracked files hard-fail --check when non-compliant.
legacy_until_date: 2026-06-12
stale_after_days: 90
scan_exclude: []
backlog_globs: []
# SPEC-0011 G5 — close-time gate enforcement (opt-in). Consulted ONLY by the
# CALLERS (the AAI:INDEX-AUTOGEN pre-commit hook and the closeout skills) to choose
# block-vs-warn; `docs-audit.mjs --gate <ID>` itself always returns the raw
# predicate exit code. Values: enforce | report-only. Default (key or file absent)
# is report-only — a failing close gate warns but never blocks the commit.
close_gate: report-only
# SPEC-0015 / RFC-0007 — parallel-safe doc-numbering guards (no-DRAFT-at-merge +
# duplicate-number), consulted by the pre-commit host (pre-commit-checks.sh/.ps1)
# AND by the CI mirror (.github/workflows/docs-numbering.yml) to choose
# block-vs-warn. Values: enforce | report-only. Absent key/file falls open to
# report-only, but the shipped default is ENFORCE (spec-learned-to-layer-promotion:
# flow proven across 8 allocations): a staged/merged DRAFT or duplicate number
# BLOCKS. Safe for in-flight branches — the guard reads the STAGED tree
# (git ls-files), and /aai-pr allocates numbers before staging, so untracked
# working-tree drafts never block. Projects may set report-only.
doc_number_guard: enforce
# RFC-0009 / spec-scale-adaptive-ceremony — L3 protected surfaces (project-owned
# config; the POLICY and these canonical defaults live in
# .aai/workflow/WORKFLOW.md "Ceremony levels"). A spec whose scope touches any
# listed path MUST declare `ceremony_level: 3` at freeze; review may
# re-classify a level upward (recorded finding). Consult-time policy for
# Planning/review — no mechanical diff enforcement yet (phase 2 candidate).
protected_paths_l3:
  - .aai/scripts/state.mjs
  - .aai/scripts/lib/state-engine.mjs
  - .aai/scripts/lib/state-core.mjs
  - .aai/scripts/allocate-doc-number.mjs
  - .aai/scripts/pre-commit-checks.sh
  - .aai/scripts/pre-commit-checks.ps1
  - .aai/workflow/WORKFLOW.md
  - docs/CONSTITUTION.md

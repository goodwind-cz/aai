# AI Model Pricing Reference
# Costs are in USD per 1,000,000 tokens.
# Keep backwards compatibility for calculators reading:
#   models.<model_id>.input_usd_per_m
#   models.<model_id>.output_usd_per_m

schema_version: 2

pricing_meta:
  currency: USD
  token_unit: per_1m_tokens
  default_effective_region: global
  last_updated_utc: "2026-07-15T19:19:02Z"

update_policy:
  cadence_days: 30
  require_source_ref: true
  require_last_verified_utc: true
  on_unknown_model: "add model with null pricing and source_ref, then verify"
  # CHANGE-0010 D4 prune rule (measurable): delete every models: entry that has
  # null pricing AND does not appear in docs/ai/METRICS.jsonl history, plus its
  # now-dangling model_aliases rows. `unknown` is always kept. Priced entries
  # stay (valid data, other AAI projects may record them).
  prune_rule: "null-priced AND absent from METRICS.jsonl history => delete (keep `unknown`)"
  update_steps:
    - "Read official vendor pricing page."
    - "Update model entry prices and last_verified_utc."
    - "If pricing is tiered, store standard list price in notes."
    - "Run metrics/report flow and verify null/known costs."

# Deterministic model-id resolution for calculators/flush (CHANGE-0010 D4).
# Apply the steps IN ORDER; the first step that lands on a `models:` key wins:
#   1. strip-bracket-suffix: remove ONE trailing bracket suffix `[...]` from the
#      runtime id (claude-opus-4-8[1m] -> claude-opus-4-8)
#   2. model-aliases: apply the model_aliases map below
#   3. exact-match: exact key match in models
#   4. longest-prefix: longest models key that is a prefix of the id
#   5. unknown-fallback: fall back to the `unknown` entry
lookup_rules:
  order:
    - strip-bracket-suffix
    - model-aliases
    - exact-match
    - longest-prefix
    - unknown-fallback
  strip_suffix_pattern: "\\[[^\\]]*\\]$"

sources:
  openai-pricing:
    provider: openai
    url: "https://platform.openai.com/pricing"
    last_verified_utc: "2026-02-19T08:27:12Z"
  openai-codex-release:
    provider: openai
    url: "https://openai.com/index/introducing-upgrades-to-codex/"
    last_verified_utc: "2026-02-19T08:27:12Z"
  anthropic-pricing:
    provider: anthropic
    url: "https://www.anthropic.com/pricing"
    last_verified_utc: "2026-07-15T19:19:02Z"
  google-ai-pricing:
    provider: google
    url: "https://ai.google.dev/gemini-api/docs/pricing"
    last_verified_utc: "2026-02-19T08:27:12Z"
  deepseek-pricing:
    provider: deepseek
    url: "https://api-docs.deepseek.com/quick_start/pricing"
    last_verified_utc: null

# Normalize runtime model IDs to canonical pricing keys (lookup_rules step 2).
model_aliases:
  gpt-4o-2024-xx: gpt-4o
  gpt-4o-mini-2024-xx: gpt-4o-mini
  gpt-5.3: gpt-5.3-codex
  gpt-5.3-codex-2026-02: gpt-5.3-codex
  gemini-2.5-pro-latest: gemini-2.5-pro
  gemini-2.5-flash-latest: gemini-2.5-flash
  gemini-3-pro-latest: gemini-3-pro-preview
  gemini-3-flash-latest: gemini-3-flash-preview
  # Belt-and-braces for the one bracketed id already in METRICS.jsonl history:
  # alias-only readers resolve it without implementing suffix stripping.
  "claude-opus-4-8[1m]": claude-opus-4-8


# Expert Subagent Registry
# Maps technology keywords to external agent definitions from
# github.com/VoltAgent/awesome-claude-code-subagents
#
# SECURITY: All fetches are pinned to a verified commit SHA.
# Update pinned_sha after reviewing upstream changes.
# Cache is local-only (.aai/cache/experts/) and gitignored.

source:
  repo: VoltAgent/awesome-claude-code-subagents
  pinned_sha: "87321636a1c666283d8f17398b45c2644395044b"
  base_path: categories

# Maximum allowed prompt size (bytes) — reject fetched files larger than this
max_prompt_bytes: 8192

# Cache TTL in minutes (0 = always re-validate against pinned_sha)
cache_ttl_minutes: 1440

# Tool whitelist — only these tools may be granted to external experts.
# Any tools requested in the agent frontmatter outside this list are stripped.
allowed_tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep

# Blocked categories — never fetch agents from these categories
blocked_categories:
  - 09-meta-orchestration  # AAI owns orchestration
  - 08-business-product    # not relevant for implementation

# Expert index: keyword → agent file path (relative to base_path)
# Multiple keywords can map to the same agent.
# Used by EXPERT_RESOLVE.prompt.md for matching.

# .aai/system/PROFILES.yaml — vendored-layer profiles (CHANGE layer-profiles,
# RES-0001 P3 rec 13, OpenSpec pattern).
#
# CONTRACT
# - Two flat lists of repo-relative paths under .aai/ (.aai/cache/** excluded —
#   runtime artifact, never synced). Their UNION must equal the vendored .aai
#   tree exactly: 100% classified, disjoint, no stale entries. Enforced by
#   tests/skills/test-aai-layer-profiles.sh TEST-001 against the LIVE tree —
#   a new .aai file that is not classified here fails the suite.
# - `extended` PROFILE = the whole tree (core list + extended list). The
#   extended sync path never reads this file — copy-everything behavior is
#   structurally unchanged. `core` PROFILE = exactly the `core:` list.
# - Consumed by .aai/scripts/aai-sync.sh / aai-sync.ps1 (--profile core).
#   Parsed line-based ("  - <path>") by bash awk and PowerShell regex — keep
#   this exact two-space-dash indentation; indented "  #" comment lines are
#   ignored by both parsers.
# - CLASSIFICATION RULE (spec spec-layer-profiles D2):
#   core = the workflow engine — orchestration/role/intake prompts, state +
#   docs + index + events scripts and their import closure, gates (TDD /
#   verify / debug / review / check-state / docs-audit / pre-commit /
#   hook-gate / locks), loop + HITL + flush, distribution & health (sync /
#   update / doctor / layer-drift / bootstrap / migrate-state), templates the
#   flows instantiate, and canon.
#   extended = reporting & publishing (dashboard, profile, metrics-report,
#   docs-hub, share, validate-report), integrations (decapod, expert),
#   one-off maintenance/migration (canonicalize, docs-canon, test-canon,
#   migrate-yaml-to-jsonl), session conveniences (session-journal, wrap-up),
#   brownfield analysis, deprecated (auto-trigger), self-hosting QA.
# - Non-.aai surfaces (root shims, hooks/, agent skill wrappers, docs/knowledge
#   seeds) are profile-independent and always synced; wrappers self-report when
#   their prompt is absent (spec D3).

